name: Build and Publish WASMs

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force a complete rebuild of all WASMs, ignoring cache'
        required: false
        type: boolean
        default: false
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        shard: [0, 1, 2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Free Runner Space
        uses: justinthelaw/maximize-github-runner-space@v0.9.0
        with:
          skip-components: cached-node, cached-python
          swapfile-size: 50G

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup and cache Emscripten
        uses: mymindstorm/setup-emsdk@v15
        with:
          version: 5.0.1
          actions-cache-folder: 'emsdk-cache'

      - name: Cache WASI SDK
        id: cache-wasi
        uses: actions/cache@v5
        with:
          path: ~/.cache/tree-sitter/wasi-sdk
          key: wasi-sdk-29-${{ runner.os }}

      - name: Install WASI SDK
        run: |
          WASI_VERSION=29
          CACHE_DIR="$HOME/.cache/tree-sitter"
          SDK_DIR="$CACHE_DIR/wasi-sdk"

          mkdir -p "$CACHE_DIR"

          if [ "${{ steps.cache-wasi.outputs.cache-hit }}" != 'true' ]; then
            echo "Cache miss: Downloading WASI SDK..."
            curl -LO "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION}.0-x86_64-linux.tar.gz"
            mkdir -p "$SDK_DIR"
            tar -xzf "wasi-sdk-${WASI_VERSION}.0-x86_64-linux.tar.gz" --strip-components=1 -C "$SDK_DIR"
            rm "wasi-sdk-${WASI_VERSION}.0-x86_64-linux.tar.gz"
          else
            echo "Cache hit: Using restored WASI SDK structure."
          fi

          echo "$SDK_DIR/bin" >> $GITHUB_PATH
          echo "WASI_SDK_PATH=$SDK_DIR" >> $GITHUB_ENV

      - name: Install Dependencies
        run: pnpm install

      - name: Cache Built WASMs
        id: cache-out
        uses: actions/cache@v5
        with:
          path: |
            out
            .build-state.json
          key: wasm-build-${{ runner.os }}-shard-${{ matrix.shard }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ inputs.force_rebuild && github.run_id || 'default' }}
          restore-keys: |
            wasm-build-${{ runner.os }}-shard-${{ matrix.shard }}-

      - name: Build WASMs
        run: pnpm run build
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
          NODE_OPTIONS: "--max-old-space-size=12884"
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 3

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: out-shard-${{ matrix.shard }}
          path: out/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Generate Changelog from Conventional Commits
        if: github.event_name == 'release'
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}

      - name: Commit CHANGELOG.md
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_message: 'docs: update CHANGELOG.md for ${{ github.ref_name }}'
          file_pattern: CHANGELOG.md

      - name: Update GitHub Release Description
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changes }}
          append_body: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: out-shard-*
          path: out
          merge-multiple: true

      - name: Generate Manifest
        run: pnpm run build
        env:
          MANIFEST_ONLY: true

      - name: Publish to NPM
        run: |
          if pnpm view $(node -p "require('./package.json').name")@$(node -p "require('./package.json').version") > /dev/null 2>&1; then
            echo "Version already published to NPM. Skipping deployment."
          else
            pnpm publish --no-git-checks --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
